services:
  - type: web
    name: safeguard360
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        scope: run
      - key: API_KEY
        scope: run
      - key: FHIR_SERVER_URL
        scope: run
        value: "http://localhost:8000/fhir"
